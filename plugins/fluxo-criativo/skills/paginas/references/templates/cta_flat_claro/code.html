<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atelier. CTA Intermediário</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            base: '#fafafa',
            surface: '#f0f0f2',
            ink: '#18181b',
            accent: '#d4d4d8',
            warm: '#c2956b',
          },
          fontFamily: {
            inter: ['Inter', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #fafafa; color: #18181b; -webkit-font-smoothing: antialiased; }

    .flat-border { border: 1.5px solid #18181b; }

    /* fadeUp */
    .fadeUp {
      opacity: 0;
      transform: translateY(32px);
      transition: opacity 0.7s cubic-bezier(0.22, 1, 0.36, 1), transform 0.7s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .fadeUp.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .fadeUp-delay-1 { transition-delay: 0.1s; }
    .fadeUp-delay-2 { transition-delay: 0.2s; }
    .fadeUp-delay-3 { transition-delay: 0.3s; }

    /* CTA button */
    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #c2956b;
      color: #fafafa;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 1.05rem;
      letter-spacing: -0.01em;
      padding: 18px 40px;
      border: none;
      border-radius: 0;
      cursor: pointer;
      transition: background 0.25s ease, transform 0.2s ease;
    }
    .cta-btn:hover {
      background: #b0844f;
      transform: translateY(-2px);
    }
    .cta-btn .material-symbols-outlined {
      font-size: 20px;
      transition: transform 0.25s ease;
    }
    .cta-btn:hover .material-symbols-outlined {
      transform: translateX(4px);
    }

    /* subtle radial gradient */
    .section-cta {
      background: #fafafa;
      background-image: radial-gradient(ellipse at 50% 0%, rgba(194,149,107,0.06) 0%, transparent 65%);
    }
  </style>
</head>
<body>

  <section class="section-cta py-24 sm:py-32 px-6">
    <div class="max-w-xl mx-auto text-center">

      <h2 class="fadeUp font-inter font-700 text-ink text-2xl sm:text-3xl leading-snug tracking-tight">
        Se você reconhece o caos de versões,<br>o próximo passo é ver o método em quatro passos.
      </h2>

      <p class="fadeUp fadeUp-delay-1 font-inter font-light text-ink/70 text-base sm:text-lg leading-relaxed mt-6 max-w-md mx-auto">
        A biblioteca Planilhas Pro organiza a entrega em modelo pronto, vídeo de uso e melhorias quando o negócio muda.
      </p>

      <div class="fadeUp fadeUp-delay-2 mt-10">
        <p class="text-3xl sm:text-4xl font-extrabold text-ink mb-1">12x de R$&nbsp;16,42</p>
        <p class="text-sm text-ink/50">ou R$&nbsp;197,00 à vista</p>
      </div>

      <div class="fadeUp fadeUp-delay-3 mt-8">
        <button class="cta-btn" onclick="window.location.hash='checkout'">
          Quero ver o método e a oferta
          <span class="material-symbols-outlined">arrow_forward</span>
        </button>
      </div>

      <p class="fadeUp fadeUp-delay-3 font-normal text-ink/40 text-sm mt-5 tracking-tight">
        <span class="material-symbols-outlined align-middle text-base mr-1" style="font-size:16px;">lock</span>
        Acesso imediato · Garantia de 7 dias
      </p>

    </div>
  </section>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
          }
        });
      }, { threshold: 0.15 });

      document.querySelectorAll('.fadeUp').forEach(el => observer.observe(el));
    });
  </script>

</body>
</html>
